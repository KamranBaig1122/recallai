<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recall Calendar Integration{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .notice { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .notice.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .notice.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn { padding: 8px 16px; background: #6c5ce7; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { background: #5a4fcf; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        form { margin: 20px 0; }
        input[type="text"], input[type="email"], input[type="password"] { padding: 8px; width: 300px; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        {% if notice %}
        <div class="notice {{ notice.type }}">
            {{ notice.message }}
        </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
